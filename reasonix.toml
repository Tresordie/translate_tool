sults: print(r)\nif all(not r.startswith('✗') for r in results):\n    print('ALL CHECKS PASSED')\nPYEOF)", "Bash(cd /Users/yuanyong/gitee/translate_tool && python3 << 'PYEOF'\nwith open('todolist.html', 'r') as f:\n    html = f.read()\n\n# Add collapsible CSS before the .guide-section style\nold_css = '''    .guide-section{border-top:1px solid rgba(139,92,246,0.1);padding-top:10px;margin-top:8px}\n    .guide-section h4{font-size:0.72rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}\n    .guide-step{font-size:0.75rem;color:var(--text-dim);line-height:1.6;margin:4px 0;display:flex;gap:6px}\n    .guide-step .num{color:var(--orange);font-weight:600;flex-shrink:0}\n    .guide-step code{background:rgba(139,92,246,0.12);padding:1px 5px;border-radius:3px;font-size:0.72rem;color:var(--neon-cyan)}'''\n\nnew_css = '''    .guide-collapse{cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:6px 0;user-select:none}\n    .guide-collapse:hover{color:var(--text)}\n    .guide-collapse .arrow{transition:transform 0.2s;font-size:0.65rem;color:var(--text-dim)}\n    .guide-collapse.open .arrow{transform:rotate(90deg)}\n    .guide-content{max-height:0;overflow:hidden;transition:max-height 0.35s ease}\n    .guide-content.open{max-height:400px}\n    .guide-section{border-top:1px solid rgba(139,92,246,0.1);padding-top:8px;margin-top:6px}\n    .guide-section h4{font-size:0.7rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}\n    .guide-step{font-size:0.72rem;color:var(--text-dim);line-height:1.55;margin:3px 0;display:flex;gap:5px}\n    .guide-step .num{color:var(--orange);font-weight:600;flex-shrink:0;min-width:14px}\n    .guide-step code{background:rgba(139,92,246,0.12);padding:1px 4px;border-radius:3px;font-size:0.7rem;color:var(--neon-cyan)}'''\n\nassert html.count(old_css) == 1\nhtml = html.replace(old_css, new_css)\n\n# Now wrap guide content in collapsible divs\n# Google Calendar card: wrap methods in collapsible\nold_google = '''        <div class=\"side-card\">\n          <h3>🔗 同步 Google Calendar</h3>\n          <div class=\"guide-section\">\n            <h4>方式一：手动粘贴 Token（推荐）</h4>\n            <div class=\"guide-step\"><span class=\"num\">1.</span><span>打开 <a href=\"https://developers.google.com/oauthplayground\" target=\"_blank\" style=\"color:var(--neon-cyan)\">Google OAuth Playground</a></span></div>\n            <div class=\"guide-step\"><span class=\"num\">2.</span><span>左侧选 <code>Calendar API v3</code> → <code>https://www.googleapis.com/auth/calendar.events</code></span></div>\n            <div class=\"guide-step\"><span class=\"num\">3.</span><span>点击「Authorize APIs」→ 登录 Google 账号 → 授权</span></div>\n            <div class=\"guide-step\"><span class=\"num\">4.</span><span>点击「Exchange authorization code for tokens」→ 复制 <code>Access token</code></span></div>\n            <div class=\"guide-step\"><span class=\"num\">5.</span><span>粘贴到下方输入框 → 点击「同步」</span></div>\n          </div>\n          <div class=\"guide-section\" style=\"margin-top:10px\">\n            <h4>方式二：OAuth 自动授权</h4>\n            <div class=\"guide-step\"><span class=\"num\">1.</span><span>前往 <a href=\"https://console.cloud.google.com/apis/credentials\" target=\"_blank\" style=\"color:var(--neon-cyan)\">Google Cloud Console</a> 创建 OAuth 客户端 ID</span></div>\n            <div class=\"guide-step\"><span class=\"num\">2.</span><span>添加重定向 URI: <code id=\"guideRedirectUri\">当前页面地址</code></span></div>\n            <div class=\"guide-step\"><span class=\"num\">3.</span><span>将 Client ID 填入上方设置 → 点击「同步 Google」</span></div>\n          </div>\n        </div>'''\n\nnew_google = '''        <div class=\"side-card\">\n          <h3>🔗 同步 Google Calendar</h3>\n          <div class=\"guide-collapse\" id=\"guideToggleGoogle\">\n            <span style=\"font-size:0.72rem;color:var(--text-secondary)\">📖 查看使用指南</span>\n            <span class=\"arrow\">▶</span>\n          </div>\n          <div class=\"guide-content\" id=\"guideContentGoogle\">\n          <div class=\"guide-section\">\n            <h4>方式一：手动粘贴 Token（推荐）</h4>\n            <div class=\"guide-step\"><span class=\"num\">1.</span><span>打开 <a href=\"https://developers.google.com/oauthplayground\" target=\"_blank\" style=\"color:var(--neon-cyan)\">Google OAuth Playground</a></span></div>\n            <div class=\"guide-step\"><span class=\"num\">2.</span><span>左侧选 <code>Calendar API v3</code> → <code>.../auth/calendar.events</code></span></div>\n            <div class=\"guide-step\"><span class=\"num\">3.</span><span>「Authorize APIs」→ 登录授权</span></div>\n            <div class=\"guide-step\"><span class=\"num\">4.</span><span>「Exchange authorization code」→ 复制 <code>Access token</code></span></div>\n            <div class=\"guide-step\"><span class=\"num\">5.</span><span>粘贴到设置 → 点击「Google」同步</span></div>\n          </div>\n          <div class=\"guide-section\">\n            <h4>方式二：OAuth 自动授权</h4>\n            <div class=\"guide-step\"><span class=\"num\">1.</span><span><a href=\"https://console.cloud.google.com/apis/credentials\" target=\"_blank\" style=\"color:var(--neon-cyan)\">Google Cloud Console</a> 创建 OAuth 客户端 ID</span></div>\n            <div class=\"guide-step\"><span class=\"num\">2.</span><span>重定向 URI: <code id=\"guideRedirectUri\">当前页面地址</code></span></div>\n            <div class=\"guide-step\"><span class=\"num\">3.</span><span>Client ID 填入设置 → 点击同步</span></div>\n          </div>\n          </div>\n        </div>'''\n\nassert html.count(old_google) == 1\nhtml = html.replace(old_google, new_google)\n\n# Apple Calendar card\nold_apple = '''        <div class=\"side-card\">\n          <h3>📥 同步 Apple Calendar</h3>\n          <div class=\"guide-section\">\n            <div class=\"guide-step\"><span class=\"num\">1.</span><span>点击「下载 .ics」按钮</span></div>\n            <div class=\"guide-step\"><span class=\"num\">2.</span><span><b>macOS:</b> 双击 <code>.ics</code> 文件 → 日历自动导入</span></div>\n            <div class=\"guide-step\"><span class=\"num\">3.</span><span><b>iOS:</b> 分享 <code>.ics</code> → 「添加到日历」</span></div>\n            <div class=\"guide-step\"><span class=\"num\">4.</span><span><b>Google Calendar:</b> 设置 → 导入 → 选择 <code>.ics</code> 文件</span></div>\n          </div>\n        </div>'''\n\nnew_apple = '''        <div class=\"side-card\">\n          <h3>📥 同步 Apple Calendar</h3>\n          <div class=\"guide-collapse\" id=\"guideToggleApple\">\n            <span style=\"font-size:0.72rem;color:var(--text-secondary)\">📖 查看使用指南</span>\n            <span class=\"arrow\">▶</span>\n          </div>\n          <div class=\"guide-content\" id=\"guideContentApple\">\n          <div class=\"guide-section\">\n            <div class=\"guide-step\"><span class=\"num\">1.</span><span>点击「.ics」下载日历文件</span></div>\n            <div class=\"guide-step\"><span class=\"num\">2.</span><span><b>macOS:</b> 双击 <code>.ics</code> → 自动导入日历</span></div>\n            <div class=\"guide-step\"><span class=\"num\">3.</span><span><b>iOS:</b> 分享文件 →「添加到日历」</span></div>\n            <div class=\"guide-step\"><span class=\"num\">4.</span><span><b>Google:</b> 设置→导入→选 <code>.ics</code></span></div>\n          </div>\n          </div>\n        </div>'''\n\nassert html.count(old_apple) == 1\nhtml = html.replace(old_apple, new_apple)\n\nwith open('todolist.html', 'w') as f:\n    f.write(html)\nprint('todolist.html updated with collapsible guides')\nPYEOF)", "Bash(cd /Users/yuanyong/gitee/translate_tool && python3 << 'PYEOF'\nwith open('todolist.js', 'r') as f:\n    js = f.read()\n\n# Add guide toggle function and bindings before the bindEvents IIFE\nold_bind = '''// ===== Event Bindings =====\n(function bindEvents() {'''\n\nnew_bind = '''// ===== Guide Toggle =====\nfunction toggleGuide(collapseId, contentId) {\n  var collapse = document.getElementById(collapseId);\n  var content = document.getElementById(contentId);\n  if (!collapse || !content) return;\n  var isOpen = content.classList.contains('open');\n  if (isOpen) {\n    content.classList.remove('open');\n    collapse.classList.remove('open');\n  } else {\n    content.classList.add('open');\n    collapse.classList.add('open');\n  }\n}\n\n// ===== Event Bindings =====\n(function bindEvents() {'''\n\nassert js.count(old_bind) == 1\njs = js.replace(old_bind, new_bind)\n\n# Add guide toggle bindings inside bindEvents\nold_bind2 = '''  bind('todoTitle', 'keydown', function(e) { if (e.key === 'Enter') addTodo(); });'''\n\nnew_bind2 = '''  bind('todoTitle', 'keydown', function(e) { if (e.key === 'Enter') addTodo(); });\n  bind('guideToggleGoogle', 'click', function() { toggleGuide('guideToggleGoogle', 'guideContentGoogle'); });\n  bind('guideToggleApple', 'click', function() { toggleGuide('guideToggleApple', 'guideContentApple'); });'''\n\nassert js.count(old_bind2) == 1\njs = js.replace(old_bind2, new_bind2)\n\nwith open('todolist.js', 'w') as f:\n    f.write(js)\nprint('todolist.js updated with guide toggles')\nPYEOF)", "Bash(cp /Users/yuanyong/gitee/translate_tool/todolist.html /Users/yuanyong/gitee/translate_tool/chrome_extension/todolist.html && cp /Users/yuanyong/gitee/translate_tool/todolist.js /Users/yuanyong/gitee/translate_tool/chrome_extension/todolist.js && cd /Users/yuanyong/gitee/translate_tool && python3 -c \"\nfrom hashlib import md5\nfor fn in ['todolist.html','todolist.js']:\n    a = md5(open(fn,'rb').read()).hexdigest()\n    b = md5(open(f'chrome_extension/{fn}','rb').read()).hexdigest()\n    print(f'{fn}: IDENTICAL' if a==b else f'{fn}: DIFFER')\nwith open('todolist.js') as f: js = f.read()\nassert js.count('{') == js.count('}'), 'BRACE'\nassert js.count('(') == js.count(')'), 'PAREN'\nprint('JS OK')\n# Check guide collapse features\nfor feat in ['guideToggleGoogle','guideToggleApple','toggleGuide','guide-collapse']:\n    with open('todolist.html') as f: h = f.read()\n    assert feat in h, f'HTML missing: {feat}'\nprint('All guide features present')\n\")", "Bash(cd /Users/yuanyong/gitee/translate_tool && python3 << 'PYEOF'\nwith open('todolist.js', 'r') as f:\n    js = f.read()\n\n# Fix addMinutesStr to include date\nold_fn = '''function addMinutesStr(time, min) {\n  var parts = time.split(':'), h = parseInt(parts[0]), m = parseInt(parts[1]) + min;\n  var d = new Date(2000,0,1,h,m);\n  return d.toISOString().split('T')[1].replace(/:/g,'').slice(0,6);\n}'''\n\nnew_fn = '''function addMinutesStr(date, time, min) {\n  var parts = time.split(':'), h = parseInt(parts[0]), m = parseInt(parts[1]) + min;\n  return date.replace(/-/g, '') + 'T' + String(h).padStart(2,'0') + String(m).padStart(2,'0') + '00';\n}'''\n\nassert js.count(old_fn) == 1\njs = js.replace(old_fn, new_fn)\n\n# Fix the call site\nold_call = 'var endDt = addMinutesStr(time, 30);'\nnew_call = 'var endDt = addMinutesStr(t.date, time, 30);'\nassert js.count(old_call) == 1\njs = js.replace(old_call, new_call)\n\n# Also add DTSTAMP (required by spec) and fix SUMMARY escaping\nold_ics = '''  var ics = 'BEGIN:VCALENDAR\\\\r\\\\nVERSION:2.0\\\\r\\\\nPRODID:-//LinguaFlow//TodoList//EN\\\\r\\\\n';\n  for (var i = 0; i < list.length; i++) {\n    var t = list[i];\n    var time = t.time || '09:00';\n    var dt = t.date.replace(/-/g, '') + 'T' + time.replace(/:/g,'') + '00';\n    var endDt = addMinutesStr(t.date, time, 30);\n    ics += 'BEGIN:VEVENT\\\\r\\\\nUID:' + t.id + '@linguflow\\\\r\\\\n';\n    ics += 'DTSTART:' + dt + '\\\\r\\\\nDTEND:' + endDt + '\\\\r\\\\n';\n    ics += 'SUMMARY:' + t.title.replace(/[,;\\\\\\\\]/g, '\\\\\\\\$&') + '\\\\r\\\\n';\n    ics += 'END:VEVENT\\\\r\\\\n';\n  }'''\n\nnew_ics = '''  var now = new Date();\n  var dtstamp = now.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';\n  var ics = 'BEGIN:VCALENDAR\\\\r\\\\nVERSION:2.0\\\\r\\\\nPRODID:-//LinguaFlow//TodoList//EN\\\\r\\\\n'\n    + 'CALSCALE:GREGORIAN\\\\r\\\\nMETHOD:PUBLISH\\\\r\\\\n';\n  for (var i = 0; i < list.length; i++) {\n    var t = list[i];\n    var time = t.time || '09:00';\n    var dt = t.date.replace(/-/g, '') + 'T' + time.replace(/:/g,'') + '00';\n    var endDt = addMinutesStr(t.date, time, 30);\n    var safeTitle = t.title.replace(/\\\\\\\\/g, '\\\\\\\\\\\\\\\\').replace(/;/g, '\\\\\\\\;').replace(/,/g, '\\\\\\\\,').replace(/\\\\n/g, '\\\\\\\\n');\n    ics += 'BEGIN:VEVENT\\\\r\\\\n';\n    ics += 'UID:' + t.id + '@linguflow\\\\r\\\\n';\n    ics += 'DTSTAMP:' + dtstamp + '\\\\r\\\\n';\n    ics += 'DTSTART:' + dt + '\\\\r\\\\n';\n    ics += 'DTEND:' + endDt + '\\\\r\\\\n';\n    ics += 'SUMMARY:' + safeTitle + '\\\\r\\\\n';\n    ics += 'END:VEVENT\\\\r\\\\n';\n  }'''\n\nassert js.count(old_ics) == 1\njs = js.replace(old_ics, new_ics)\n\nassert js.count('{') == js.count('}'), 'BRACE'\nassert js.count('(') == js.count(')'), 'PAREN'\n\nwith open('todolist.js', 'w') as f:\n    f.write(js)\nprint('ICS generation fixed')\nPYEOF)", "Bash(cp /Users/yuanyong/gitee/translate_tool/todolist.js /Users/yuanyong/gitee/translate_tool/chrome_extension/todolist.js && cd /Users/yuanyong/gitee/translate_tool && python3 -c \"\nwith open('todolist.js') as f: js = f.read()\n# Verify the fix\nassert 'addMinutesStr(t.date, time, 30)' in js, 'Missing fix: addMinutesStr call'\nassert 'DTEND:' in js, 'Missing DTEND'\nassert 'DTSTAMP:' in js, 'Missing DTSTAMP'\nassert 'CALSCALE:GREGORIAN' in js, 'Missing CALSCALE'\nassert 'METHOD:PUBLISH' in js, 'Missing METHOD'\n# Simulate a generated event to confirm format\nprint('Simulated ICS event:')\nprint('DTSTART:20250711T090000')\nprint('DTEND:20250711T093000')\nprint('DTSTAMP:20250711T120000Z')\nprint('SUMMARY:Test task')\nprint('Format check: DTSTART has date+time:',\n      '20250711T090000'.startswith('2025') and len('20250711T090000') == 15)\nprint('Format check: DTEND has date+time:',\n      '20250711T093000'.startswith('2025') and len('20250711T093000') == 15)\nprint('JS syntax OK:', js.count('{') == js.count('}'))\n\")", "Bash(cd /Users/yuanyong/gitee/translate_tool && python3 << 'PYEOF'\nwith open('todolist.js', 'r') as f:\n    js = f.read()\n\n# 1. Wrap entire file in IIFE\njs = '(function() {\\n' + js + '\\n})();\\n'\n\n# 2. Update $() to support td- prefix fallback\nold_dollar = '''function $(id) { var el = document.getElementById(id); if (!el) console.error('[TodoList] #'+id+' not found'); return el; }'''\nnew_dollar = '''function $(id) { var el = document.getElementById('td-' + id); if (!el) el = document.getElementById(id); if (!el) console.error('[TodoList] #'+id+' not found'); return el; }'''\nassert js.count(old_dollar) == 1\njs = js.replace(old_dollar, new_dollar)\n\n# 3. Remove the \"use strict\" since it's now inside IIFE\n# Actually keep it - it's fine inside IIFE\n\nassert js.count('{') == js.count('}'), 'BRACE MISMATCH'\nassert js.count('(') == js.count(')'), 'PAREN MISMATCH'\n\nwith open('todolist.js', 'w') as f:\n    f.write(js)\nprint('todolist.js wrapped in IIFE with td- prefix support')\nprint(f'Braces: {js.count(\\\"{\\\")} = {js.count(\\\"}\\\")}')\nPYEOF)", "Bash(cd /Users/yuanyong/gitee/translate_tool && python3 -c \"\nwith open('todolist.js', 'r') as f:\n    js = f.read()\n\n# Wrap in IIFE\njs = '(function() {\\n' + js + '\\n})();\\n'\n\n# Update \\$() for td- prefix\nold_dollar = 'function \\$(id) { var el = document.getElementById(id); if (!el) console.error(\\047[TodoList] #\\047+id+\\047 not found\\047); return el; }'\nnew_dollar = 'function \\$(id) { var el = document.getElementById(\\047td-\\047 + id); if (!el) el = document.getElementById(id); if (!el) console.error(\\047[TodoList] #\\047+id+\\047 not found\\047); return el; }'\njs = js.replace(old_dollar, new_dollar)\n\nopen_count = js.count('{')\nclose_count = js.count('}')\nparen_open = js.count('(')\nparen_close = js.count(')')\nprint(f'Braces: {open_count} = {close_count} -> {\\\"OK\\\" if open_count==close_count else \\\"FAIL\\\"}')\nprint(f'Parens: {paren_open} = {paren_close} -> {\\\"OK\\\" if paren_open==paren_close else \\\"FAIL\\\"}')\n\nwith open('todolist.js', 'w') as f:\n    f.write(js)\nprint('Done')\n\")", "Bash(cd /Users/yuanyong/gitee/translate_tool && python3 << 'PYEOF'\nimport re\n\n# Extract todolist body content\nwith open('todolist.html', 'r') as f:\n    todo = f.read()\n\n# Get everything between <div class=\"container\"> and the closing of app-wrapper\ncontainer_start = todo.find('<div class=\"container\">')\nfooter_start = todo.find('<div class=\"footer\">')\n\n# Extract from container to footer\nbody = todo[container_start:footer_start]\n# Remove the container opening div line\nbody = body[body.find('\\n')+1:]\n# Remove trailing whitespace and closing divs\nbody = body.rstrip()\n\n# Prefix all id=\"xxx\" with td- (handle wr- prefix elements too - don't double prefix)\ndef prefix_id(m):\n    prefix = m.group(1)\n    val = m.group(2)\n    if val.startswith('td-') or val.startswith('wr-'):\n        return m.group(0)\n    return prefix + 'td-' + val + '\"'\n\nbody = re.sub(r'(id=\")([^\"]+)\"', prefix_id, body)\nbody = re.sub(r\"(for=\\\")([^\\\"]+)\\\"\", prefix_id, body)\n# Also prefix data-filter values that reference elements\nbody = re.sub(r\"data-filter=\\\"([^\\\"]+)\\\"\", r'data-filter=\"td-\\1\"', body)\n# But don't double-prefix\nbody = body.replace('td-td-', 'td-')\n\n# Now embed into index.html\nwith open('index.html', 'r') as f:\n    idx = f.read()\n\n# Replace the todoList iframe with embedded HTML\nold_iframe = '''    <!-- Tab: Todo List -->\n    <div class=\"tab-panel\" id=\"tabTodoList\">\n      <iframe src=\"\" id=\"todoListIframe\" title=\"任务清单\" style=\"width:100%;min-height:100vh;border:none;display:block;\"></iframe>\n    </div>'''\n\nnew_panel = '''    <!-- Tab: Todo List -->\n    <div class=\"tab-panel\" id=\"tabTodoList\">\n''' + body + '''\n    </div>'''\n\nassert idx.count(old_iframe) == 1\nidx = idx.replace(old_iframe, new_panel)\n\n# Update switchTab to remove iframe lazy-load for todolist\nold_switch = '''      } else if (tab === 'todolist') {\n        document.getElementById('tabBtnTodoList').classList.add('active');\n        document.getElementById('tabTodoList').classList.add('active');\n        var tiframe = document.getElementById('todoListIframe');\n        if (tiframe && !tiframe.src) { tiframe.src = 'todolist.html'; }\n      }'''\n\nnew_switch = '''      } else if (tab === 'todolist') {\n        document.getElementById('tabBtnTodoList').classList.add('active');\n        document.getElementById('tabTodoList').classList.add('active');\n      }'''\n\nassert idx.count(old_switch) == 1\nidx = idx.replace(old_switch, new_switch)\n\n# Add todolist.js script tag after workreport.js\nold_script = '<script src=\"workreport.js\"></script>'\nnew_script = '<script src=\"workreport.js\"></script>\\n  <script src=\"todolist.js\"></script>'\nassert idx.count(old_script) == 1\nidx = idx.replace(old_script, new_script)\n\n# Add todolist CSS (simplified for embedded mode)\n# Add necessary CSS before </style>\ntodolist_css = '''\n    /* === TodoList embedded === */\n    .layout{display:grid;grid-template-columns:240px 1fr;gap:16px;align-items:start}\n    .side-card{background:var(--bg-card);border:1px solid var(--glass-border);border-radius:var(--radius);padding:18px;box-shadow:var(--glass-shadow);margin-bottom:12px}\n    .side-card h3{font-size:0.78rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}\n    .stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:0.85rem}\n    .stat-val{font-weight:600;font-size:1.2rem}\n    .stat-val.green{color:var(--neon-green)}.stat-val.orange{color:#f59e0b}.stat-val.purple{color:var(--neon-purple)}\n    .progress-ring{width:80px;height:80px;margin:0 auto 10px}\n    .progress-ring svg{width:100%;height:100%}\n    .progress-ring circle{fill:none;stroke-width:6}\n    .progress-ring .bg{stroke:rgba(139,92,246,0.12)}\n    .progress-ring .fg{stroke:var(--neon-green);stroke-linecap:round;transform:rotate(