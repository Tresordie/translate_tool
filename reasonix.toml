n markdownToHtml(md) {\n    // Escape HTML entities first\n    var html = md\n      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');\n\n    // Split into lines\n    var lines = html.split('\\\\n');\n    var result = [];\n    var inList = null; // 'ul' or 'ol' or null\n\n    for (var i = 0; i < lines.length; i++) {\n      var line = lines[i];\n      var trimmed = line.trim();\n\n      // Blank line\n      if (trimmed === '') {\n        if (inList) { result.push('</' + inList + '>'); inList = null; }\n        continue;\n      }\n\n      // Horizontal rule\n      if (/^---+\\s*$/.test(trimmed)) {\n        if (inList) { result.push('</' + inList + '>'); inList = null; }\n        result.push('<hr>');\n        continue;\n      }\n\n      // H2: ## heading\n      var m = trimmed.match(/^##\\\\s+(.+)/);\n      if (m) {\n        if (inList) { result.push('</' + inList + '>'); inList = null; }\n        result.push('<h2>' + m[1] + '</h2>');\n        continue;\n      }\n\n      // H3: ### heading\n      m = trimmed.match(/^###\\\\s+(.+)/);\n      if (m) {\n        if (inList) { result.push('</' + inList + '>'); inList = null; }\n        result.push('<h3>' + m[1] + '</h3>');\n        continue;\n      }\n\n      // H4: #### heading\n      m = trimmed.match(/^####\\\\s+(.+)/);\n      if (m) {\n        if (inList) { result.push('</' + inList + '>'); inList = null; }\n        result.push('<h4>' + m[1] + '</h4>');\n        continue;\n      }\n\n      // Unordered list: - item or * item\n      m = trimmed.match(/^[-*]\\\\s+(.+)/);\n      if (m) {\n        if (inList !== 'ul') {\n          if (inList) result.push('</' + inList + '>');\n          result.push('<ul>');\n          inList = 'ul';\n        }\n        result.push('<li>' + m[1] + '</li>');\n        continue;\n      }\n\n      // Ordered list: 1. item\n      m = trimmed.match(/^\\\\d+\\\\.\\\\s+(.+)/);\n      if (m) {\n        if (inList !== 'ol') {\n          if (inList) result.push('</' + inList + '>');\n 