eturn;\n    }\n\n    const now = Date.now();\n    const record = {\n      id: now.toString(),\n      content: text,\n      date: formatDate(now),\n      time: formatTime(now),\n      timestamp: now,\n    };\n\n    records.unshift(record);\n    // Cap at 200 records\n    if (records.length > 200) records = records.slice(0, 200);\n\n    storage.set({ work_records: records }).then(() => {\n      $('workInput').value = '';\n      storage.remove(['work_draft']);\n      $('draftHint').textContent = '输入内容自动保存草稿';\n      renderRecords();\n      showToast('记录已保存 — ' + formatDateTime(now), 'success');\n    }).catch(function(e) {\n      console.error('[WorkReport] saveRecord failed:', e);\n      var inp = $('workInput');\n      if (inp) inp.value = text;\n      showToast('保存失败，请重试', 'error');\n    });\n  }'''\n\nnew_save = '''  // ===== Save / Update Record =====\n  function saveRecord() {\n    const text = $('workInput').value.trim();\n    if (!text) {\n      showToast('请输入工作内容', 'error');\n      return;\n    }\n\n    if (editingRecordId) {\n      // Update existing record\n      var idx = -1;\n      for (var i = 0; i < records.length; i++) {\n        if (records[i].id === editingRecordId) { idx = i; break; }\n      }\n      if (idx >= 0) {\n        records[idx].content = text;\n        records[idx].date = formatDate(Date.now());\n        records[idx].time = formatTime(Date.now());\n        records[idx].timestamp = Date.now();\n        // Move to top\n        var updated = records.splice(idx, 1)[0];\n        records.unshift(updated);\n      }\n      storage.set({ work_records: records }).then(() => {\n        $('workInput').value = '';\n        storage.remove(['work_draft']);\n        $('draftHint').textContent = '输入内容自动保存草稿';\n        editingRecordId = null;\n        updateSaveBtnLabel();\n        renderRecords();\n        showToast('记录已更新', 'success');\n      }).catch(function(e) {\n        console.error('[WorkReport] updateRecord failed:', e);\n        showToast('更新失败，请重试', 'error');\n      });\n      return;\n    }\n\n    // Create new record\n    const now = Date.now();\n    const record = {\n      id: now.toString(),\n      content: text,\n      date: formatDate(now),\n      time: formatTime(now),\n      timestamp: now,\n    };\n\n    records.unshift(record);\n    if (records.length > 200) records = records.slice(0, 200);\n\n    storage.set({ work_records: records }).then(() => {\n      $('workInput').value = '';\n      storage.remove(['work_draft']);\n      $('draftHint').textContent = '输入内容自动保存草稿';\n      renderRecords();\n      showToast('记录已保存 — ' + formatDateTime(now), 'success');\n    }).catch(function(e) {\n      console.error('[WorkReport] saveRecord failed:', e);\n      var inp = $('workInput');\n      if (inp) inp.value = text;\n      showToast('保存失败，请重试', 'error');\n    });\n  }\n\n  // ===== Edit Record (load into input) =====\n  function editRecord(id) {\n    for (var i = 0; i < records.length; i++) {\n      if (records[i].id === id) {\n        var inp = $('workInput');\n        if (inp) inp.value = records[i].content;\n        editingRecordId = id;\n        updateSaveBtnLabel();\n        inp.focus();\n        showToast('正在编辑记录 — 修改后点击「更新记录」保存', 'success');\n        return;\n      }\n    }\n  }\n\n  // ===== Cancel Edit =====\n  function cancelEdit() {\n    editingRecordId = null;\n    var inp = $('workInput');\n    if (inp) inp.value = '';\n    storage.remove(['work_draft']);\n    $('draftHint').textContent = '输入内容自动保存草稿';\n    updateSaveBtnLabel();\n  }\n\n  // ===== Update Save Button Label =====\n  function updateSaveBtnLabel() {\n    var btn = $('saveRecordBtn');\n    if (!btn) return;\n    if (editingRecordId) {\n      btn.innerHTML = '<svg width=\\\"16\\\" height=\\\"16\\\" viewBox=\\\"0 0 24 24\\\" fill=\\\"none\\\" stroke=\\\"currentColor\\\" stroke-width=\\\"2\\\" stroke-linecap=\\\"round\\\" stroke-linejoin=\\\"round\\\"><path d=\\\"M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z\\\"/><polyline points=\\\"17 21 17 13 7 13 7 21\\\"/><polyline points=\\\"7 3 7 8 15 8\\\"/></svg> 更新记录<span class=\\\"kbd\\\" style=\\\"background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.2);\\\">Ctrl+↵</span>';\n    } else {\n      btn.innerHTML = '<svg width=\\\"16\\\" height=\\\"16\\\" viewBox=\\\"0 0 24 24\\\" fill=\\\"none\\\" stroke=\\\"currentColor\\\" stroke-width=\\\"2\\\" stroke-linecap=\\\"round\\\" stroke-linejoin=\\\"round\\\"><path d=\\\"M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z\\\"/><polyline points=\\\"17 21 17 13 7 13 7 21\\\"/><polyline points=\\\"7 3 7 8 15 8\\\"/></svg> 保存记录<span class=\\\"kbd\\\" style=\\\"background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.2);\\\">Ctrl+↵</span>';\n    }\n  }'''\n\nassert js.count(old_save) == 1, f'Found {js.count(old_save)}'\njs = js.replace(old_save, new_save)\n\n# 3. Add click-to-edit on record items (the whole item, not just delete button)\n# In renderRecords, add data-id and click handler on the record-item div\nold_render = '''    list.innerHTML = filtered.map(r => `\n      <div class=\"record-item\">\n        <div class=\"record-time\">\n          <div class=\"record-date\">${escapeHtml(r.date)}</div>\n          <div class=\"record-clock\">${escapeHtml(r.time)}</div>\n        </div>\n        <div class=\"record-content\">${escapeHtml(r.content)}</div>\n        <button class=\"record-delete\" data-id=\"${r.id}\" title=\"删除\">'''\n\nnew_render = '''    list.innerHTML = filtered.map(r => `\n      <div class=\"record-item\" data-rid=\"${r.id}\" title=\"点击编辑\">\n        <div class=\"record-time\">\n          <div class=\"record-date\">${escapeHtml(r.date)}</div>\n          <div class=\"record-clock\">${escapeHtml(r.time)}</div>\n        </div>\n        <div class=\"record-content\">${escapeHtml(r.content)}</div>\n        <button class=\"record-delete\" data-id=\"${r.id}\" title=\"删除\">'''\n\nassert js.count(old_render) == 1\njs = js.replace(old_render, new_render)\n\n# 4. Add click-to-edit handler in renderRecords\nold_attach = '''    // Attach delete handlers\n    list.querySelectorAll('.record-delete').forEach(btn => {\n      btn.addEventListener('click', (e) => {\n        e.stopPropagation();\n        deleteRecord(btn.dataset.id);\n      });\n    });\n  }'''\n\nnew_attach = '''    // Click record item to edit\n    list.querySelectorAll('.record-item').forEach(function(item) {\n      item.addEventListener('click', function(e) {\n        if (e.target.closest('.record-delete')) return;\n        editRecord(item.dataset.rid);\n      });\n    });\n\n    // Attach delete handlers\n    list.querySelectorAll('.record-delete').forEach(function(btn) {\n      btn.addEventListener('click', function(e) {\n        e.stopPropagation();\n        deleteRecord(btn.dataset.id);\n      });\n    });\n  }'''\n\nassert js.count(old_attach) == 1\njs = js.replace(old_attach, new_attach)\n\n# 5. Add cancelEdit button binding in bindEventsSync\nold_bind_cancel = '''    btn = $('clearAllRecordsBtn');\n    if (btn) btn.addEventListener('click', clearAllRecords);'''\n\nnew_bind_cancel = '''    btn = $('clearAllRecordsBtn');\n    if (btn) btn.addEventListener('click', clearAllRecords);\n    btn = $('cancelEditBtn');\n    if (btn) btn.addEventListener('click', cancelEdit);'''\n\nassert js.count(old_bind_cancel) == 1\njs = js.replace(old_bind_cancel, new_bind_cancel)\n\nassert js.count('{') == js.count('}'), 'BRACE'\nassert js.count('(') == js.count(')'), 'PAREN'\n\nwith open('/Users/yuanyong/gitee/translate_tool/workreport.js', 'w') as f:\n    f.write(js)\nprint('Edit feature added')\nPYEOF\npython3 /tmp/fix_edit.py)", "Bash(cd /Users/yuanyong/gitee/translate_tool && python3 << 'PYEOF'\n# Add CSS to workreport.html\nwith open('workreport.html', 'r') as f:\n    html = f.read()\n\nold_css = '''    .btn-record:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }'''\nnew_css = '''    .btn-record:disabled { opacity: 0.5; cursor: not-allowed; transform: n