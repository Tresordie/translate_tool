<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Resize handles -->
  <div class="resize-handle resize-n" data-dir="n"></div>
  <div class="resize-handle resize-s" data-dir="s"></div>
  <div class="resize-handle resize-e" data-dir="e"></div>
  <div class="resize-handle resize-w" data-dir="w"></div>
  <div class="resize-handle resize-ne" data-dir="ne"></div>
  <div class="resize-handle resize-nw" data-dir="nw"></div>
  <div class="resize-handle resize-se" data-dir="se"></div>
  <div class="resize-handle resize-sw" data-dir="sw"></div>

  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo-wrap">
          <svg class="logo-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span class="ai-pulse"></span>
        </div>
        <div class="header-text">
          <span class="logo-text">LinguaFlow</span>
          <span class="header-tag">AI Translation</span>
        </div>
      </div>
      <button class="settings-btn" id="toggleSettings" title="设置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button class="fullscreen-btn" id="openFullscreen" title="在新标签页打开（无高度限制）">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
        </svg>
      </button>
      <button class="todolist-btn" id="openTodoList" title="打开任务清单">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </button>
      <button class="report-btn" id="openWorkReport" title="打开工作报告">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </button>
      <button class="english-btn" id="openEnglishLearning" title="英语学习">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </button>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
      <div class="form-group">
        <label>Base URL</label>
        <input id="baseUrl" type="text" placeholder="https://api.deepseek.com" />
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input id="apiKey" type="password" placeholder="sk-xxxxxxxxxxxxxxxx" />
      </div>
      <div class="form-group">
        <label>模型 / Model</label>
        <input id="modelName" type="text" placeholder="deepseek-v4-pro" />
      </div>
      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" id="enableSelectTranslate" checked />
          <span>启用划词翻译</span>
        </label>
      </div>
      <button class="save-btn" id="saveSettings">保存配置</button>
    </div>

    <!-- Language Bar -->
    <div class="lang-bar">
      <select id="sourceLang"></select>
      <button class="swap-btn" id="swapLangs" title="交换语言">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
      <select id="targetLang"></select>
    </div>

    <!-- Translate Area -->
    <div class="translate-area">
      <textarea id="sourceText" placeholder="请输入要翻译的文本...&#10;或划选网页文字后点击翻译图标"></textarea>
      <div class="source-footer">
        <span class="char-count" id="charCount">0</span>
        <button class="icon-btn" id="clearBtn" title="清空">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Translate Button -->
    <button class="translate-btn" id="translateBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
      开始翻译
      <span class="btn-shortcut">Ctrl+↵</span>
    </button>

    <!-- Result Area -->
    <div class="result-area" id="resultArea">
      <div class="result-label">译文</div>
      <div class="result-text" id="resultText"></div>
      <div class="result-footer" id="resultFooter" style="display:none;">
        <button class="icon-btn" id="copyBtn" title="复制">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          复制
        </button>
      </div>
    </div>

    <!-- History Section -->
    <div class="history-section" id="historySection">
      <div class="history-header">
        <div class="history-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          翻译历史
        </div>
        <button class="history-clear-btn" id="clearHistoryBtn" title="清空历史">清空</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
